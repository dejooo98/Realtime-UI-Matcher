# Single Web Service: Express API + static Vite build (same origin).
# Free tier services may sleep after idle time; first request can be slow (cold start).
# Optional: RENDER_CAPTURE_MAX_DIM=1400 — cap screenshot edge length on RENDER=true (default 1600).

services:
  - type: web
    name: realtime-ui-matcher
    runtime: node
    plan: free
    # Plain npm install is enough: Vite is a client dependency; root build skips Turbo.
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
