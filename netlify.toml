# Netlify deploy (monorepo)
# ────────────────────────
# Site settings should use REPOSITORY ROOT as base (Base directory: / or empty).
# Do NOT set "Package directory" to `client` only — npm workspaces need install at
# the repo root so `server/` deps resolve for the Netlify Function (Puppeteer API).
#
# Build: Vite client → client/dist. API: `netlify/functions/api.js` (CJS entry → ESM app) → Express app.
#
# Optional env in Netlify UI (Site configuration → Environment variables):
#   - CORS_ORIGIN=https://YOUR_SITE.netlify.app  (only if browser calls API from another origin)
#   - API_RATE_LIMIT_MAX=60                       (optional; server default applies)
#   - SERVERLESS_NAV_MAX_MS=55000                 (optional; max Puppeteer goto ms on Netlify;
#     default 25000. Match to your function timeout if you upgrade the plan.)
#   - Do NOT set VITE_API_URL for default hosting: the SPA calls /api on the same origin.
#
# Function timeout: `timeout = 60` requires a Netlify plan that allows it (free tier is
# typically capped at 10s — URL/screenshot compares may need Pro or a longer limit).
# Large JSON responses also hit ~6MB Lambda limits; the app clamps PNGs and omits
# redundant base64 echoes (image–image + design–URL) in serverless mode.

[build]
  command = "npm run build:netlify"
  publish = "client/dist"

[build.environment]
  NODE_VERSION = "20"
  # Trust X-Forwarded-* when behind Netlify’s CDN
  TRUST_PROXY = "1"

# Do not set NODE_ENV=production here: it makes `npm install` omit devDependencies
# during the Netlify build (no Vite/turbo). Set NODE_ENV in Netlify UI for Functions only if needed.

[functions]
  directory = "netlify/functions"
  # Include server sources + native chromium binary for @sparticuz/chromium
  included_files = ["server/src/**", "server/package.json", "netlify/functions/package.json"]
  # CJS function entry + NFT; keep puppeteer stack external (mitt ESM + native chromium).
  node_bundler = "nft"
  external_node_modules = [
    "@sparticuz/chromium",
    "puppeteer-core",
    "chromium-bidi",
    "mitt",
    "devtools-protocol",
    "ws"
  ]

# Longer runs for Puppeteer (requires a Netlify plan that allows >10s if you raise this).
[functions.api]
  timeout = 60
  # Slightly more CPU/RAM can shorten Chromium cold start on URL capture
  memory = 2048

# API + health → Express function (same-origin as the SPA; no separate API host).
# :splat matches Netlify’s Express guide so the function receives the full /api/… path.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/api"
  status = 200
  force = true

# SPA fallback (static files are tried first by Netlify).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
